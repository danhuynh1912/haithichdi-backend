services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tours_db}
      POSTGRES_USER: ${POSTGRES_USER:-tours_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tours_pass}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "1"
      USE_S3: "1"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-tours-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_PUBLIC_ENDPOINT_URL: ${AWS_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      POSTGRES_DB: ${POSTGRES_DB:-tours_db}
      POSTGRES_USER: ${POSTGRES_USER:-tours_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tours_pass}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - minio

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    env_file:
    - ./frontend/.env
    environment:
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # GIẢI PHÁP ĐÂY: Giữ lại node_modules của Docker
      - /app/.next
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb --ignore-existing local/$${AWS_STORAGE_BUCKET_NAME} &&
      /usr/bin/mc anonymous set download local/$${AWS_STORAGE_BUCKET_NAME};
      "
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-tours-media}

volumes:
  db_data:
  minio_data:
